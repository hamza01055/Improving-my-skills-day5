name: ai_second_brain
description: AI-powered second brain — chat with documents, notes, tasks, and voice.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management & DI
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3

  # Storage
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # NOTE: Phase 2+ dependencies (add when the feature lands, keep pubspec lean):
  # flutter_markdown, cached_network_image  -> AI Chat
  # file_picker, image_picker              -> Documents
  # speech_to_text, flutter_tts            -> Voice Assistant
  # firebase_core, firebase_auth,
  # google_sign_in                          -> Google login (run `flutterfire configure`)
  # lottie                                  -> Onboarding illustrations

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
