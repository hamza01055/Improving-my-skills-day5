name: intellivault
description: IntelliVault — chat with documents, notes, tasks, and voice.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management & DI
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3

  # Storage
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Documents
  file_picker: ^8.1.2

  # Chat rendering
  flutter_markdown_plus: ^1.0.3
  markdown: ^7.3.1
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0

  # Voice
  speech_to_text: ^7.0.0

  # NOTE: Phase 2+ dependencies (add when the feature lands, keep pubspec lean):
  # cached_network_image                    -> AI Chat
  # image_picker                            -> Documents (camera capture)
  # flutter_tts                             -> Voice Assistant (text-to-speech replies)
  # firebase_core, firebase_auth,
  # google_sign_in                          -> Google login (run `flutterfire configure`)
  # lottie                                  -> Onboarding illustrations

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
